      <p>当元素处于普通状态和拥有属性absolute时,其百分比宽度的计算的参照对象不相同.</p>
<style type="text/css">
   .box {
        width: 150px;
        height: 150px;
        background: yellow;
        border: 10px  dashed black;
        position:relative;
        padding:10px;
    }
    .child {
        width: 100%;
        height: 100%;
        background:  blue;
    }
</style>
<p>一般情况下,等于父元素宽度</p>
<div class="el-1 box">
    <div class="child"></div>
</div>
<p>当
存在属性box-sizing: border-box时,等于父元素宽度减去父元素边框和内边距</p>
<div class="el-2 box" style="box-sizing: border-box">
    <div class="child" style="box-sizing: border-box"></div>
</div>
<p>当子元素存在属性position:absolute时,等于父元素padding box宽度</p>
<div class="el-3 box">
	<div class="child" style="position:absolute;"></div>
</div>
<p>box-sizing: border-box同上</p>
<div class="el-4 box" style="box-sizing: border-box">
	<div class="child" style="position:absolute;box-sizing: border-box"></div>
</div>
